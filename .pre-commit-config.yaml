repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        files: ^cfinterface/
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - numpy>=2.0.0
          - types-setuptools
