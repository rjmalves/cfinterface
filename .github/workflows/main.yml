name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install the project
        run: |
          uv sync --all-extras --dev
      - name: Run tests
        run: |
          uv run pytest -m "not benchmark" --cov-report=xml --cov=cfinterface ./tests
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          env_vars: OS,PYTHON
          name: codecov-cfinterface
          fail_ci_if_error: true
          verbose: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install the project
        run: |
          uv sync --all-extras --dev
      - name: Mypy
        run: |
          uv run mypy ./cfinterface
      - name: Ruff
        run: |
          uv run ruff check ./cfinterface
      - name: Ty (informational)
        continue-on-error: true
        run: |
          uvx ty check ./cfinterface
      - name: Sphinx
        run: |
          uv run python -m sphinx -M html docs/source docs/build -W
